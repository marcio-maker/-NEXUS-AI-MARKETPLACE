<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#050509">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NEXUS // AI Model Marketplace - 128+ SLMs | 100M Tokens Grátis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #050509;
            --bg-card: #0a0b14;
            --bg-elevated: #0f101a;
            --primary: #00f2ff;
            --primary-dim: rgba(0, 242, 255, 0.08);
            --secondary: #bc00ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3355;
            --text-main: #eef2ff;
            --text-muted: #8e9aaf;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --transition: all 0.2s ease;
        }
        body.light-theme {
            --bg-dark: #f0f2f5;
            --bg-card: #ffffff;
            --bg-elevated: #f8f9fa;
            --primary: #0066cc;
            --secondary: #9900cc;
            --success: #00a86b;
            --warning: #ff8c00;
            --danger: #dc3545;
            --text-main: #1a1a2e;
            --text-muted: #555555;
            --border-subtle: rgba(0, 0, 0, 0.08);
        }
        body { background: var(--bg-dark); color: var(--text-main); font-family: var(--font-sans); line-height: 1.5; min-height: 100vh; transition: var(--transition); }
        
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        .neon { color: var(--primary); }
        
        .hero { text-align: center; padding: 3rem 0 2rem 0; }
        .hero h1 { font-family: var(--font-mono); font-size: 2.5rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; }
        .hero p { font-size: 1rem; color: var(--text-muted); max-width: 550px; margin: 0 auto 2rem auto; }
        .hero-stats { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .hero-stat { text-align: center; }
        .hero-stat-number { font-size: 2.2rem; font-weight: 700; font-family: var(--font-mono); color: var(--primary); }
        .hero-stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .free-badge { display: inline-block; background: var(--primary-dim); border: 1px solid var(--primary); color: var(--primary); padding: 0.3rem 1rem; border-radius: 30px; font-size: 0.7rem; font-weight: 600; margin-top: 1rem; }
        
        .custom-section { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 20px; padding: 2rem; text-align: center; margin: 2rem 0; }
        .custom-section h3 { font-family: var(--font-mono); font-size: 1.2rem; margin-bottom: 0.5rem; }
        .custom-section p { font-size: 0.85rem; color: var(--text-muted); max-width: 500px; margin: 0 auto 1.5rem auto; }
        .custom-textarea { width: 100%; max-width: 600px; margin: 0 auto 1rem auto; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 0.8rem; color: var(--text-main); font-family: var(--font-mono); font-size: 0.8rem; resize: vertical; min-height: 80px; display: block; }
        .custom-textarea:focus { outline: none; border-color: var(--primary); }
        
        .models-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; margin: 1rem 0 2rem 0; }
        .model-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 1rem; transition: all 0.2s; cursor: pointer; }
        .model-card:hover { transform: translateY(-2px); border-color: var(--primary); box-shadow: 0 4px 20px rgba(0,242,255,0.1); }
        .model-name { font-size: 0.95rem; font-weight: 700; font-family: var(--font-mono); margin-bottom: 0.2rem; }
        .model-type { font-size: 0.6rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .model-desc { font-size: 0.75rem; color: var(--text-muted); margin: 0.5rem 0; line-height: 1.4; }
        .model-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.8rem; font-size: 0.65rem; }
        .model-params { background: var(--bg-elevated); padding: 0.2rem 0.5rem; border-radius: 12px; font-family: var(--font-mono); }
        .model-cost { color: var(--warning); font-weight: 600; }
        .deploy-btn { background: var(--primary-dim); border: 1px solid var(--primary); padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.65rem; cursor: pointer; transition: 0.2s; color: var(--primary); font-family: var(--font-mono); }
        .deploy-btn:hover { background: var(--primary); color: #000; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-card); border: 1px solid var(--primary); border-radius: 20px; max-width: 480px; width: 90%; padding: 1.5rem; position: relative; animation: modalFadeIn 0.3s ease; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .modal-close:hover { color: var(--danger); }
        .modal-title { font-family: var(--font-mono); font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--primary); }
        .modal-body { font-size: 0.85rem; color: var(--text-muted); margin: 1rem 0; line-height: 1.5; }
        .modal-detail { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--border-subtle); font-size: 0.8rem; }
        .modal-buttons { display: flex; gap: 1rem; margin-top: 1rem; }
        .modal-buttons button { flex: 1; }
        
        .panel { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .panel-title { font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .stats-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .stat-card { flex: 1; min-width: 100px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 0.8rem; text-align: center; position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--primary); animation: scanLine 3s infinite linear; opacity: 0.5; }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }
        .stat-number { font-size: 1.5rem; font-weight: 700; font-family: var(--font-mono); }
        .stat-label-sm { font-size: 0.6rem; text-transform: uppercase; color: var(--text-muted); }
        .transactions-list { max-height: 300px; overflow-y: auto; }
        .transaction-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border-subtle); font-size: 0.7rem; flex-wrap: wrap; gap: 0.5rem; }
        .token-badge { background: linear-gradient(135deg, #00f2ff10, #bc00ff10); border: 1px solid var(--primary); border-radius: 20px; padding: 0.5rem; font-family: var(--font-mono); font-size: 0.7rem; text-align: center; margin-top: 1rem; }
        
        .btn-primary { background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; font-weight: 600; cursor: pointer; color: white; padding: 0.6rem 1.2rem; border-radius: 10px; transition: opacity 0.2s; font-family: var(--font-mono); font-size: 0.8rem; width: 100%; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary { background: transparent; border: 1px solid var(--primary); cursor: pointer; padding: 0.5rem 1rem; border-radius: 10px; color: var(--primary); transition: all 0.2s; font-family: var(--font-mono); font-size: 0.75rem; }
        .btn-secondary:hover { background: var(--primary-dim); }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #000; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0a0b14 0%, #050509 100%); z-index: 3000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        body.light-theme .loading-overlay { background: radial-gradient(ellipse at center, #e0e0e0 0%, #cccccc 100%); }
        .loading-overlay.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-glitch { font-family: var(--font-mono); font-size: 2rem; color: var(--primary); animation: loadingPulse 1.5s infinite; margin-bottom: 1rem; }
        @keyframes loadingPulse { 0%,100% { opacity: 1; text-shadow: 0 0 5px var(--primary); } 50% { opacity: 0.6; text-shadow: 0 0 20px var(--primary); } }
        .loading-spinner { width: 48px; height: 48px; border: 2px solid var(--border-subtle); border-top: 2px solid var(--primary); border-radius: 50%; animation: loadingSpin 1s linear infinite; margin: 1rem 0; }
        @keyframes loadingSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .login-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, #0a0b14 0%, #050509 100%); z-index: 1500; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; opacity: 1; }
        body.light-theme .login-container { background: radial-gradient(ellipse at center, #e0e0e0 0%, #cccccc 100%); }
        .login-container.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-box { background: var(--bg-card); border: 1px solid var(--primary); border-radius: 20px; padding: 1.5rem; width: 90%; max-width: 400px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
        .login-box h2 { font-family: var(--font-mono); color: var(--primary); text-align: center; margin-bottom: 0.3rem; font-size: 1.1rem; }
        .login-subtitle { text-align: center; color: var(--text-muted); font-size: 0.7rem; margin-bottom: 1.2rem; }
        .login-input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-subtle); padding: 0.7rem; border-radius: 10px; color: var(--text-main); margin-bottom: 0.8rem; font-family: var(--font-mono); font-size: 0.8rem; }
        .login-input:focus { outline: none; border-color: var(--primary); }
        .login-btn { width: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; padding: 0.7rem; border-radius: 10px; color: white; font-weight: 700; cursor: pointer; font-family: var(--font-mono); font-size: 0.85rem; }
        .login-error { color: var(--danger); font-size: 0.75rem; text-align: center; margin-top: 0.8rem; }
        
        .main-app { display: none; }
        .main-app.visible { display: block; }
        .header { position: sticky; top: 0; background: rgba(5, 5, 9, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-subtle); padding: 0.6rem 0; z-index: 100; }
        .header-content { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .logo { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 700; color: var(--primary); cursor: pointer; }
        .user-info { display: flex; align-items: center; gap: 0.8rem; font-family: var(--font-mono); font-size: 0.7rem; flex-wrap: wrap; }
        .status-badge { background: var(--success); color: #000; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.6rem; font-weight: 600; }
        .token-display { background: var(--bg-elevated); border-radius: 20px; padding: 0.15rem 0.6rem; font-family: var(--font-mono); font-size: 0.7rem; border: 1px solid var(--primary); }
        .hamburger { display: flex; flex-direction: column; gap: 3px; background: none; border: none; cursor: pointer; z-index: 200; }
        .hamburger span { width: 18px; height: 2px; background: var(--primary); transition: 0.3s; }
        .side-menu { position: fixed; top: 0; left: -260px; width: 260px; height: 100vh; background: var(--bg-card); border-right: 1px solid var(--border-subtle); z-index: 300; transition: left 0.3s ease; padding: 4rem 1rem 1rem; display: flex; flex-direction: column; gap: 0.3rem; overflow-y: auto; }
        .side-menu.open { left: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 299; display: none; }
        .menu-overlay.open { display: block; }
        .menu-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem; border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem; transition: 0.2s; }
        .menu-item:hover { background: var(--primary-dim); }
        .menu-item i { width: 22px; color: var(--primary); }
        
        /* Simulation Modal */
        .simulation-log { background: var(--bg-elevated); border-radius: 8px; padding: 0.8rem; margin: 1rem 0; max-height: 200px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.7rem; text-align: left; color: var(--primary); border: 1px solid var(--border-subtle); }
        .simulation-log p { margin: 0.3rem 0; }
        .sim-progress { width: 100%; height: 4px; background: var(--border-subtle); border-radius: 4px; margin: 1rem 0; overflow: hidden; }
        .sim-progress-bar { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s ease; }
        
        @media (max-width: 640px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.8rem; }
            .models-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="initialLoading">
    <div class="loading-glitch">NEXUS//AI</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">INICIALIZANDO SISTEMA...</div>
</div>

<div class="login-container" id="loginContainer">
    <div class="login-box">
        <h2><i class="fas fa-brain"></i> NEXUS AI MARKETPLACE</h2>
        <div class="login-subtitle">Small Language Models for Business</div>
        <input type="text" id="loginUser" class="login-input" placeholder="Usuário" value="nexus_user">
        <input type="password" id="loginPass" class="login-input" placeholder="Senha" value="nexus2026">
        <button class="login-btn" id="loginBtn"><i class="fas fa-gem"></i> CRIAR CONTA • 100M TOKENS GRÁTIS</button>
        <div id="loginError" class="login-error"></div>
        <div class="token-badge"><i class="fas fa-coins"></i> PLANO 0 • 100 MILHÕES DE TOKENS GRÁTIS NO CADASTRO</div>
    </div>
</div>

<div class="main-app" id="mainApp">
    <div class="side-menu" id="sideMenu">
        <div class="menu-item" id="menuBrowse"><i class="fas fa-store"></i> Browse Models</div>
        <div class="menu-item" id="menuCustom"><i class="fas fa-microchip"></i> Custom Model</div>
        <div class="menu-item" id="menuDashboard"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="menu-item" id="menuDeployed"><i class="fas fa-rocket"></i> Deployed</div>
        <div class="menu-item" id="menuTokens"><i class="fas fa-coins"></i> Tokens</div>
        <div class="menu-item" id="menuTheme"><i class="fas fa-moon"></i> Tema Claro/Escuro</div>
        <div class="menu-item" id="menuLogout"><i class="fas fa-sign-out-alt"></i> Sair</div>
    </div>
    <div class="menu-overlay" id="menuOverlay"></div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div style="display: flex; align-items: center; gap: 0.8rem;">
                    <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
                    <div class="logo"><i class="fas fa-brain"></i> NEXUS // AI MARKETPLACE</div>
                </div>
                <div class="user-info">
                    <span><i class="fas fa-user-astronaut"></i> <span id="userNameDisplay">User</span></span>
                    <span class="status-badge"><i class="fas fa-circle" style="font-size: 0.35rem;"></i> LIVE</span>
                    <span class="token-display" id="tokenDisplay"><i class="fas fa-coins"></i> <span id="tokenAmount">100,000,000</span> tokens</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="container" id="appContainer"></div>
    </main>
</div>

<script>
    (function() {
        // Initial loading
        setTimeout(() => {
            const loading = document.getElementById("initialLoading");
            loading.classList.add("hide");
            setTimeout(() => loading.style.display = "none", 500);
        }, 2500);
        
        const db = localforage.createInstance({ name: "NexusMarketplace", storeName: "user_data" });
        let userTokens = 100000000;
        let currentUser = null;
        let deployedModels = [];
        let modelUsageHistory = [];
        
        // 128+ models catalog
        const modelCatalog = [
            { id: "finance-predict", name: "FinancePredict SLM", type: "Task SLM", params: "1.2B", desc: "Previsão de tendências de mercado com 97% de acurácia", longDesc: "Modelo especializado em previsão de movimentos de mercado utilizando análise de séries temporais.", cost: 1000, category: "Finance", accuracy: "97.3%" },
            { id: "sentiment-trader", name: "SentimentTrader", type: "Task SLM", params: "890M", desc: "Análise de sentimento de mercado em tempo real", longDesc: "Processa notícias e redes sociais para identificar tendências de sentimento.", cost: 800, category: "Finance", accuracy: "94.8%" },
            { id: "risk-analyzer", name: "RiskAnalyzer", type: "General <20B", params: "7B", desc: "Avaliação de risco de portfólio", longDesc: "Calcula VaR e sugere alocações otimizadas.", cost: 2500, category: "Risk", accuracy: "96.2%" },
            { id: "crypto-signal", name: "CryptoSignal AI", type: "General <20B", params: "13B", desc: "Previsão de preços de criptomoedas", longDesc: "Analisa on-chain data para gerar sinais de compra/venda.", cost: 3000, category: "Crypto", accuracy: "88.9%" },
            { id: "fraud-detection", name: "FraudDetector", type: "Task SLM", params: "680M", desc: "Detecção de fraudes em transações", longDesc: "Identifica padrões suspeitos com alta precisão.", cost: 1200, category: "Security", accuracy: "99.1%" }
        ];
        
        // Generate more models up to 128
        const categories = ["Finance", "Trading", "Crypto", "Risk", "Economics", "Security", "Quant", "NLP"];
        for (let i = modelCatalog.length + 1; i <= 128; i++) {
            modelCatalog.push({
                id: `model-${i}`,
                name: `SLM-${Math.floor(Math.random() * 9000 + 1000)}`,
                type: Math.random() > 0.5 ? "Task SLM" : "General <20B",
                params: `${(Math.random() * 15 + 0.1).toFixed(1)}B`,
                desc: `Modelo especializado para ${categories[Math.floor(Math.random() * categories.length)]}`,
                longDesc: `Modelo treinado especificamente para tarefas de ${categories[Math.floor(Math.random() * categories.length)]}.`,
                cost: Math.floor(Math.random() * 3000) + 300,
                category: categories[Math.floor(Math.random() * categories.length)],
                accuracy: `${(Math.random() * 10 + 85).toFixed(1)}%`
            });
        }
        
        function formatNumber(n) { return n.toLocaleString('pt-BR'); }
        
        // SIMULAÇÃO DE TREINAMENTO - NOVA FUNÇÃO COM ANIMAÇÃO
        function showTrainingSimulation(userPrompt, onComplete) {
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.style.display = "flex";
            modal.innerHTML = `
                <div class="modal-content" style="max-width:500px;">
                    <button class="modal-close" onclick="this.closest('.modal').remove()">✕</button>
                    <div class="modal-title"><i class="fas fa-microchip"></i> 🧠 TREINANDO IA PERSONALIZADA</div>
                    <div class="modal-body">
                        <div class="sim-progress">
                            <div class="sim-progress-bar" id="simProgress"></div>
                        </div>
                        <div class="simulation-log" id="simLog">
                            <p>🚀 Iniciando cluster de treinamento...</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const progressBar = modal.querySelector("#simProgress");
            const logDiv = modal.querySelector("#simLog");
            
            const steps = [
                "📊 Analisando requisitos: \"" + userPrompt.substring(0, 50) + "...\"",
                "⚙️ Gerando arquitetura neural customizada (SLM < 2B parâmetros)...",
                "🧠 Coletando dataset sintético para fine-tuning...",
                "🔥 Treinando camadas de atenção com 512 GPUs distribuídas...",
                "📈 Validando modelo - Acurácia: 94.7% | Perda: 0.023",
                "🔧 Otimizando hiperparâmetros para sua tarefa específica...",
                "✅ Modelo personalizado 'NEXUS-CUSTOM-' gerado com sucesso!"
            ];
            
            let step = 0;
            const interval = setInterval(() => {
                if (step < steps.length) {
                    const p = document.createElement("p");
                    p.innerHTML = steps[step];
                    logDiv.appendChild(p);
                    logDiv.scrollTop = logDiv.scrollHeight;
                    progressBar.style.width = ((step + 1) / steps.length * 100) + "%";
                    step++;
                } else {
                    clearInterval(interval);
                    const success = document.createElement("p");
                    success.style.color = "var(--success)";
                    success.innerHTML = "🎉 Treinamento concluído! Modelo pronto para uso.";
                    logDiv.appendChild(success);
                    progressBar.style.width = "100%";
                    setTimeout(() => {
                        modal.remove();
                        if (onComplete) onComplete();
                    }, 1500);
                }
            }, 800);
        }
        
        async function spendTokens(amount, description) {
            if (userTokens >= amount) {
                userTokens -= amount;
                await db.setItem(`tokens_${currentUser}`, userTokens);
                document.getElementById("tokenAmount").innerText = formatNumber(userTokens);
                modelUsageHistory.unshift({ date: new Date().toISOString(), amount, description, balance: userTokens });
                await db.setItem(`history_${currentUser}`, modelUsageHistory.slice(0, 50));
                return true;
            }
            alert("❌ Tokens insuficientes!");
            return false;
        }
        
        async function submitCustomModel() {
            const textarea = document.getElementById("customModelDesc");
            if (!textarea || !textarea.value.trim()) {
                alert("Descreva sua tarefa antes de solicitar.");
                return;
            }
            const promptText = textarea.value.trim();
            
            // Primeiro verifica tokens
            if (!await spendTokens(2500, `Custom model request: ${promptText.substring(0, 50)}...`)) return;
            
            // Mostra simulação de treinamento
            showTrainingSimulation(promptText, () => {
                alert("✅ Solicitação enviada! Nossa equipe entrará em contato com seu modelo personalizado.");
                textarea.value = "";
                renderFullUI();
            });
        }
        
        async function deployModel(model) {
            if (await spendTokens(model.cost, `Deploy: ${model.name}`)) {
                deployedModels.push({ ...model, deployedAt: new Date().toISOString() });
                await db.setItem(`deployed_${currentUser}`, deployedModels);
                alert(`✅ Modelo ${model.name} implantado com sucesso!`);
                renderFullUI();
            }
        }
        
        async function removeModel(modelId) {
            deployedModels = deployedModels.filter(m => m.id !== modelId);
            await db.setItem(`deployed_${currentUser}`, deployedModels);
            renderFullUI();
        }
        
        async function loadFromDB() {
            const t = await db.getItem(`tokens_${currentUser}`);
            if (t) userTokens = t;
            const d = await db.getItem(`deployed_${currentUser}`);
            if (d) deployedModels = d;
            const h = await db.getItem(`history_${currentUser}`);
            if (h) modelUsageHistory = h;
            document.getElementById("tokenAmount").innerText = formatNumber(userTokens);
        }
        
        function renderFullUI() {
            document.getElementById("appContainer").innerHTML = `
                <div id="browseView">
                    <div class="hero">
                        <h1>Small Models, Big Impact</h1>
                        <p>Descubra SLMs prontos para tarefas específicas do seu negócio.</p>
                        <div class="hero-stats">
                            <div class="hero-stat"><div class="hero-stat-number">${modelCatalog.length}</div><div class="hero-stat-label">MODELS</div></div>
                            <div class="hero-stat"><div class="hero-stat-number">FREE</div><div class="hero-stat-label">TO BROWSE</div></div>
                        </div>
                        <div class="free-badge">✨ Navegação gratuita — Pague apenas pela inferência</div>
                    </div>
                    <div class="section-title"><i class="fas fa-store"></i> Browse Models</div>
                    <div class="models-grid" id="modelsGrid"></div>
                    
                    <div class="custom-section">
                        <h3>Need a Custom Model?</h3>
                        <p>Descreva sua tarefa em linguagem natural e nós construiremos um SLM sob medida para você.</p>
                        <textarea id="customModelDesc" class="custom-textarea" placeholder="Descreva sua tarefa de IA. Ex: 'Preciso de um modelo que preveja movimentos de ações'"></textarea>
                        <button id="submitCustomBtn" class="btn-primary" style="width: auto; padding: 0.5rem 1.5rem;">🤖 Solicitar Modelo Personalizado (2.500 tokens)</button>
                    </div>
                </div>
                
                <div id="customView" style="display:none;">
                    <div class="custom-section">
                        <h3>Need a Custom Model?</h3>
                        <p>Descreva sua tarefa em linguagem natural e nós construiremos um SLM sob medida para você.</p>
                        <textarea id="customModelDesc2" class="custom-textarea" placeholder="Descreva sua tarefa de IA..."></textarea>
                        <button id="submitCustomBtn2" class="btn-primary" style="width: auto; padding: 0.5rem 1.5rem;">🤖 Solicitar Modelo Personalizado (2.500 tokens)</button>
                    </div>
                </div>
                
                <div id="deployedView" style="display:none;">
                    <div class="section-title"><i class="fas fa-rocket"></i> Meus Modelos Implantados</div>
                    <div id="deployedList" class="models-grid"></div>
                </div>
                
                <div id="dashboardView" style="display:none;">
                    <div class="stats-row">
                        <div class="stat-card"><div class="stat-number neon">${formatNumber(userTokens)}</div><div class="stat-label-sm">TOKENS DISPONÍVEIS</div></div>
                        <div class="stat-card"><div class="stat-number">${deployedModels.length}</div><div class="stat-label-sm">MODELOS ATIVOS</div></div>
                        <div class="stat-card"><div class="stat-number">${modelUsageHistory.length}</div><div class="stat-label-sm">TRANSAÇÕES</div></div>
                    </div>
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-history"></i> Atividade Recente</div>
                        <div id="recentActivity" class="transactions-list"></div>
                    </div>
                </div>
                
                <div id="tokensView" style="display:none;">
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-coins"></i> Meus Tokens</div>
                        <div style="text-align:center; padding:1rem;">
                            <div style="font-size:2.5rem; font-family:monospace; color:var(--primary);">${formatNumber(userTokens)}</div>
                            <div>tokens disponíveis</div>
                            <div class="token-badge" style="display:inline-block;"><i class="fas fa-gift"></i> Plano 0 - 100M tokens gratuitos</div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-history"></i> Histórico de Consumo</div>
                        <div id="tokenHistoryList" class="transactions-list"></div>
                    </div>
                </div>
            `;
            
            // Models grid
            const grid = document.getElementById("modelsGrid");
            if (grid) {
                grid.innerHTML = modelCatalog.slice(0, 24).map(m => `
                    <div class="model-card">
                        <div class="model-name">${m.name}</div>
                        <div class="model-type">${m.type} • ${m.category}</div>
                        <div class="model-desc">${m.desc}</div>
                        <div class="model-meta">
                            <span class="model-params"><i class="fas fa-microchip"></i> ${m.params}</span>
                            <span class="model-cost"><i class="fas fa-coins"></i> ${formatNumber(m.cost)} tokens</span>
                            <button class="deploy-btn" data-model-id="${m.id}">Implantar</button>
                        </div>
                    </div>
                `).join("");
                
                document.querySelectorAll(".deploy-btn").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const model = modelCatalog.find(m => m.id === btn.dataset.modelId);
                        if (model && confirm(`Confirmar implantação de ${model.name} por ${formatNumber(model.cost)} tokens?`)) {
                            deployModel(model);
                        }
                    });
                });
            }
            
            // Deployed list
            const deployedList = document.getElementById("deployedList");
            if (deployedList) {
                if (deployedModels.length === 0) {
                    deployedList.innerHTML = `<div style='grid-column:1/-1; text-align:center; padding:2rem;'>Nenhum modelo implantado ainda</div>`;
                } else {
                    deployedList.innerHTML = deployedModels.map(m => `
                        <div class="model-card">
                            <div class="model-name">${m.name}</div>
                            <div class="model-type">Implantado em: ${new Date(m.deployedAt).toLocaleDateString()}</div>
                            <div class="model-desc">${m.desc}</div>
                            <div class="model-meta">
                                <button class="deploy-btn btn-danger" data-remove-id="${m.id}">Remover</button>
                            </div>
                        </div>
                    `).join("");
                    document.querySelectorAll("[data-remove-id]").forEach(btn => {
                        btn.addEventListener("click", (e) => { e.stopPropagation(); removeModel(btn.dataset.removeId); });
                    });
                }
            }
            
            // Recent activity
            const recent = document.getElementById("recentActivity");
            if (recent) {
                recent.innerHTML = modelUsageHistory.slice(0, 10).map(h => `
                    <div class="transaction-item">
                        <span>${new Date(h.date).toLocaleString()}</span>
                        <span style="color:var(--warning)">- ${formatNumber(h.amount)} tokens</span>
                        <span>${h.description}</span>
                    </div>
                `).join("");
            }
            
            // Token history
            const historyList = document.getElementById("tokenHistoryList");
            if (historyList) {
                historyList.innerHTML = modelUsageHistory.map(h => `
                    <div class="transaction-item">
                        <span>${new Date(h.date).toLocaleString()}</span>
                        <span style="color:var(--warning)">- ${formatNumber(h.amount)} tokens</span>
                        <span>${h.description}</span>
                        <span>Saldo: ${formatNumber(h.balance)}</span>
                    </div>
                `).join("");
            }
            
            document.getElementById("submitCustomBtn")?.addEventListener("click", submitCustomModel);
            document.getElementById("submitCustomBtn2")?.addEventListener("click", submitCustomModel);
        }
        
        function showView(view) {
            const views = ["browseView", "customView", "deployedView", "dashboardView", "tokensView"];
            views.forEach(v => {
                const el = document.getElementById(v);
                if (el) el.style.display = v === `${view}View` ? "block" : "none";
            });
        }
        
        // Login
        document.getElementById("loginBtn")?.addEventListener("click", async () => {
            const username = document.getElementById("loginUser").value.trim();
            if (username) {
                currentUser = username;
                document.getElementById("loginContainer").classList.add("hide");
                document.getElementById("mainApp").classList.add("visible");
                document.getElementById("userNameDisplay").innerText = currentUser;
                await loadFromDB();
                renderFullUI();
                showView("browse");
            } else {
                document.getElementById("loginError").innerText = "Digite um nome de usuário";
            }
        });
        
        // Menu
        document.getElementById("hamburgerBtn")?.addEventListener("click", () => {
            document.getElementById("sideMenu")?.classList.toggle("open");
            document.getElementById("menuOverlay")?.classList.toggle("open");
        });
        document.getElementById("menuOverlay")?.addEventListener("click", () => {
            document.getElementById("sideMenu")?.classList.remove("open");
            document.getElementById("menuOverlay")?.classList.remove("open");
        });
        document.getElementById("menuBrowse")?.addEventListener("click", () => { showView("browse"); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuCustom")?.addEventListener("click", () => { showView("custom"); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuDashboard")?.addEventListener("click", () => { showView("dashboard"); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuDeployed")?.addEventListener("click", () => { showView("deployed"); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuTokens")?.addEventListener("click", () => { showView("tokens"); renderFullUI(); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuTheme")?.addEventListener("click", () => { document.body.classList.toggle("light-theme"); document.getElementById("sideMenu")?.classList.remove("open"); document.getElementById("menuOverlay")?.classList.remove("open"); });
        document.getElementById("menuLogout")?.addEventListener("click", () => { document.getElementById("mainApp")?.classList.remove("visible"); document.getElementById("loginContainer")?.classList.remove("hide"); document.getElementById("sideMenu")?.classList.remove("open"); });
    })();
</script>
</body>
</html>
